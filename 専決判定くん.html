<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>一宮市 専決判定くん</title>
<style>
  :root {
    --bg: #0f0f1a;
    --card: #1a1a2e;
    --card2: #16213e;
    --accent: #e94560;
    --accent2: #0f3460;
    --gold: #ffd700;
    --silver: #c0c0c0;
    --bronze: #cd7f32;
    --text: #eaeaea;
    --muted: #8888aa;
    --border: #2a2a4a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', 'Meiryo UI', Meiryo, sans-serif;
    min-height: 100vh;
    padding: 20px;
  }
  h1 {
    text-align: center;
    font-size: 1.6rem;
    margin-bottom: 6px;
    color: var(--gold);
    text-shadow: 0 0 20px rgba(255,215,0,0.4);
    letter-spacing: 2px;
  }
  .subtitle {
    text-align: center;
    color: var(--muted);
    font-size: 0.85rem;
    margin-bottom: 24px;
  }

  /* タブ */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 20px;
    background: var(--card2);
    padding: 6px;
    border-radius: 12px;
    max-width: 700px;
    margin: 0 auto 24px;
  }
  .tab-btn {
    flex: 1;
    padding: 10px 8px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: bold;
    transition: all 0.2s;
    background: transparent;
    color: var(--muted);
  }
  .tab-btn.active {
    background: var(--accent2);
    color: var(--text);
    box-shadow: 0 2px 8px rgba(15,52,96,0.5);
  }
  .tab-btn:hover:not(.active) { background: rgba(255,255,255,0.06); color: var(--text); }

  /* コンテンツ */
  .tab-content { display: none; max-width: 700px; margin: 0 auto; }
  .tab-content.active { display: block; }

  .form-card {
    background: var(--card);
    border-radius: 16px;
    padding: 24px;
    border: 1px solid var(--border);
    margin-bottom: 20px;
  }
  label {
    display: block;
    font-size: 0.82rem;
    color: var(--muted);
    margin-bottom: 6px;
    letter-spacing: 0.5px;
  }
  select, input[type="number"] {
    width: 100%;
    background: var(--card2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 1rem;
    margin-bottom: 16px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  select:focus, input[type="number"]:focus {
    border-color: var(--accent);
  }
  select option { background: #1a1a2e; }

  .amount-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  .amount-row > div { flex: 1; }
  .unit-label {
    padding-bottom: 28px;
    color: var(--muted);
    font-size: 0.95rem;
    white-space: nowrap;
  }

  .btn-judge {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--accent) 0%, #c0392b 100%);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 1.1rem;
    font-weight: bold;
    cursor: pointer;
    letter-spacing: 2px;
    transition: transform 0.1s, box-shadow 0.2s;
    box-shadow: 0 4px 15px rgba(233,69,96,0.4);
  }
  .btn-judge:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(233,69,96,0.5); }
  .btn-judge:active { transform: translateY(1px); }

  /* 結果エリア */
  #result-b2, #result-b3 {
    text-align: center;
    padding: 30px 20px;
    background: var(--card);
    border-radius: 16px;
    border: 1px solid var(--border);
    min-height: 180px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    transition: all 0.3s;
  }
  .result-empty { color: var(--muted); font-size: 0.9rem; }

  .result-label {
    font-size: 0.85rem;
    color: var(--muted);
    letter-spacing: 1px;
  }
  .result-amount {
    font-size: 1rem;
    color: var(--silver);
  }
  .result-name {
    font-size: 3.2rem;
    font-weight: 900;
    letter-spacing: 4px;
    line-height: 1.1;
    transition: all 0.3s;
    text-shadow: 0 0 30px currentColor;
  }
  .result-bang {
    font-size: 2rem;
    font-weight: 900;
    letter-spacing: 8px;
    opacity: 0.85;
  }
  .result-desc {
    font-size: 0.88rem;
    color: var(--muted);
    max-width: 400px;
    line-height: 1.5;
  }

  /* ランク別カラー */
  .rank-kacho    { color: #4fc3f7; }
  .rank-jicho    { color: #81c784; }
  .rank-bucho    { color: #ffb74d; }
  .rank-fuku     { color: var(--gold); }
  .rank-shicho   { color: #ff7043; }
  .rank-error    { color: var(--accent); }

  /* アニメ */
  @keyframes boom {
    0%   { transform: scale(0.3) rotate(-5deg); opacity: 0; }
    60%  { transform: scale(1.15) rotate(1deg); }
    80%  { transform: scale(0.95); }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }
  .anim-boom { animation: boom 0.45s cubic-bezier(0.34,1.56,0.64,1) forwards; }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%     { transform: translateX(-8px); }
    40%     { transform: translateX(8px); }
    60%     { transform: translateX(-4px); }
    80%     { transform: translateX(4px); }
  }

  /* ランクバー */
  .rank-bar {
    display: flex;
    gap: 6px;
    margin-top: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .rank-pip {
    width: 28px;
    height: 8px;
    border-radius: 4px;
    background: var(--border);
    transition: background 0.3s;
  }
  .rank-pip.active-kacho  { background: #4fc3f7; box-shadow: 0 0 6px #4fc3f7; }
  .rank-pip.active-jicho  { background: #81c784; box-shadow: 0 0 6px #81c784; }
  .rank-pip.active-bucho  { background: #ffb74d; box-shadow: 0 0 6px #ffb74d; }
  .rank-pip.active-fuku   { background: var(--gold); box-shadow: 0 0 8px var(--gold); }
  .rank-pip.active-shicho { background: #ff7043; box-shadow: 0 0 10px #ff7043; }

  /* 別表２ 区分ヘルプ */
  .help-chip {
    display: inline-block;
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 0.78rem;
    color: var(--muted);
    margin-bottom: 16px;
    cursor: default;
  }

  /* 別表３ 節カテゴリグループ */
  optgroup { font-weight: bold; }
</style>
</head>
<body>

<h1>専決判定くん</h1>
<p class="subtitle">一宮市専決規程 ― 金額を入れると、誰が専決できるか即判定！</p>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('b2')">別表２ 予定価格</button>
  <button class="tab-btn"       onclick="switchTab('b3')">別表３ 支出命令</button>
</div>

<!-- ===== 別表２ ===== -->
<div class="tab-content active" id="tab-b2">
  <div class="form-card">
    <label>契約の種類</label>
    <select id="b2-type" onchange="clearResult('b2')">
      <option value="">── 選択してください ──</option>
      <option value="kouji">工事（設計金額）</option>
      <option value="measurement">工事に関する測量・調査・設計・監理等（設計金額）</option>
      <option value="goods">物品・備品</option>
      <option value="consign">委託（工事測量・調査・設計・監理等を除く）</option>
    </select>

    <label>金額（万円）</label>
    <div class="amount-row">
      <div>
        <input type="number" id="b2-amount" min="0" step="1" placeholder="例：2500" oninput="clearResult('b2')">
      </div>
      <div class="unit-label">万円</div>
    </div>

    <button class="btn-judge" onclick="judgeB2()">判　定　！</button>
  </div>

  <div id="result-b2"><span class="result-empty">種類と金額を入力してください</span></div>
</div>

<!-- ===== 別表３ ===== -->
<div class="tab-content" id="tab-b3">
  <div class="form-card">
    <label>節・区分</label>
    <select id="b3-type" onchange="clearResult('b3')">
      <option value="">── 選択してください ──</option>

      <optgroup label="1〜6節 人件費系">
        <option value="1a">1 報酬（下記以外のもの）</option>
        <option value="1b">1 報酬（会計年度任用職員報酬）</option>
        <option value="2">2 給料</option>
        <option value="3a">3 職員手当等（下記以外のもの）</option>
        <option value="3b">3 職員手当等（議員期末手当）</option>
        <option value="4a">4 共済費（下記以外のもの）</option>
        <option value="4b">4 共済費（消防団員等公務災害補償・議員共済費）</option>
        <option value="5a">5 災害補償費（下記以外のもの）</option>
        <option value="5b">5 災害補償費（消防団員等公務災害補償費）</option>
        <option value="6">6 恩給及び退職年金</option>
      </optgroup>

      <optgroup label="7〜11節 報償・旅費・交際・消耗品等">
        <option value="7a">7 報償費（下記以外のもの）</option>
        <option value="7b">7 報償費（災害見舞金）</option>
        <option value="8a">8 旅費（下記以外のもの）</option>
        <option value="8b">8 旅費（会計年度任用職員通勤費）</option>
        <option value="9">9 交際費</option>
        <option value="10a">10 需用費（下記以外のもの）</option>
        <option value="10b">10 需用費（下記以外の光熱水費）</option>
        <option value="10c">10 需用費（公共料金システム処理の光熱水費）</option>
        <option value="10d">10 需用費（飲食料費）</option>
        <option value="10e">10 需用費（物品を除く修繕料）</option>
        <option value="11a">11 役務費（下記以外のもの）</option>
        <option value="11b">11 役務費（医療費審査支払等手数料・通信運搬費）</option>
        <option value="11c">11 役務費（公共料金システム処理の通信運搬費）</option>
      </optgroup>

      <optgroup label="12〜17節 委託・使用料・工事等">
        <option value="12a">12 委託料（下記以外のもの）</option>
        <option value="12b">12 委託料（単価契約によるもの）</option>
        <option value="13a">13 使用料及び賃借料（下記以外のもの）</option>
        <option value="13b">13 使用料及び賃借料（下記以外の単価契約によるもの）</option>
        <option value="13c">13 使用料及び賃借料（公共料金システム処理のテレビ受信料）</option>
        <option value="14">14 工事請負費</option>
        <option value="15">15 原材料費</option>
        <option value="16">16 公有財産購入費</option>
        <option value="17">17 備品購入費</option>
      </optgroup>

      <optgroup label="18〜27節 負担金・補助・扶助・その他">
        <option value="18a">18 負担金・補助及び交付金（下記以外のもの）</option>
        <option value="18b">18 負担金・補助及び交付金（奨学金・保険給付費等）</option>
        <option value="19">19 扶助費</option>
        <option value="20">20 貸付金</option>
        <option value="21">21 補償・補填及び賠償金</option>
        <option value="22a">22 償還金・利子及び割引料（下記以外のもの）</option>
        <option value="22b">22 償還金・利子及び割引料（税還付金・還付加算金）</option>
        <option value="23">23 投資及び出資金</option>
        <option value="24">24 積立金</option>
        <option value="25">25 寄附金</option>
        <option value="26">26 公課費</option>
        <option value="27">27 繰出金</option>
      </optgroup>
    </select>

    <label>金額（万円）</label>
    <div class="amount-row">
      <div>
        <input type="number" id="b3-amount" min="0" step="0.01" placeholder="例：150" oninput="clearResult('b3')">
      </div>
      <div class="unit-label">万円</div>
    </div>

    <button class="btn-judge" onclick="judgeB3()">判　定　！</button>
  </div>

  <div id="result-b3"><span class="result-empty">節・区分と金額を入力してください</span></div>
</div>

<script>
// ===== タブ切替 =====
function switchTab(tab) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  event.target.classList.add('active');
}

// ===== 専決者データ =====
const RANKS = {
  senninkacho: { name: '専任課長等',  css: 'rank-kacho',  pip: 'active-kacho',  bar: 1, emoji: '📋', msg: 'ルーティン案件！専任課長等が颯爽とはんこを押す！'     },
  kacho:       { name: '課長等',      css: 'rank-kacho',  pip: 'active-kacho',  bar: 1, emoji: '✅', msg: '定例業務！課長等がテキパキ処理します！'                },
  jicho:       { name: '部等の次長等', css: 'rank-jicho',  pip: 'active-jicho',  bar: 2, emoji: '📂', msg: 'ちょっと大きめ！次長等クラスの案件です！'              },
  bucho:       { name: '部長等',      css: 'rank-bucho',  pip: 'active-bucho',  bar: 3, emoji: '🔑', msg: 'かなりの大型案件！部長等の出番！'                     },
  fuku:        { name: '副市長',      css: 'rank-fuku',   pip: 'active-fuku',   bar: 4, emoji: '👑', msg: '大型！副市長マター！市全体を揺るがすスケール！'         },
  shicho:      { name: '市　長',      css: 'rank-shicho', pip: 'active-shicho', bar: 5, emoji: '🏛️', msg: '超大型案件！これは市長決裁！市が動く！！'              },
};

// ===== 別表２ 判定ルール =====
// [金額（万円）の閾値を降順, ランクキー]
const B2_RULES = {
  kouji:       [[5000,'fuku'],[3000,'bucho'],[1000,'jicho'],[0,'kacho']],
  measurement: [[5000,'fuku'],[3000,'bucho'],[1000,'jicho'],[0,'kacho']],
  goods:       [[3000,'fuku'],[1000,'bucho'],[ 500,'jicho'],[0,'kacho']],
  consign:     [[3000,'fuku'],[1000,'bucho'],[ 500,'jicho'],[0,'kacho']],
};

// ===== 別表３ 判定ルール =====
// 形式: [部長等閾値, 部等の次長等閾値, 課長等閾値, 専任課長等は上記未満]
// null = そのレベルは非該当（スキップ）
// 例: {bucho:1000, jicho:500, kacho:10, senninkacho:0}
// → ≥1000: 部長等, 500〜999: 部等の次長等, 10〜499: 課長等, <10: 専任課長等
// 備考テキストも付加できる

  // --- 1〜6節（人件費系）: 課長等/専任課長等の2段階 ---
  '1a':  { tiers:[{th:10,rank:'kacho'},{th:0,rank:'senninkacho'}] },
  '1b':  { tiers:[{th:10,rank:'kacho'},{th:0,rank:'senninkacho'}], note:'人事課長合議' },
  '2':   { tiers:[{th:10,rank:'kacho'},{th:0,rank:'senninkacho'}], note:'人事課長合議' },
  '3a':  { tiers:[{th:10,rank:'kacho'},{th:0,rank:'senninkacho'}], note:'人事課長合議' },
  '3b':  { tiers:[{th:10,rank:'kacho'},{th:0,rank:'senninkacho'}] },
  '4a':  { tiers:[{th:10,rank:'kacho'},{th:0,rank:'senninkacho'}], note:'人事課長合議' },
  '4b':  { tiers:[{th:10,rank:'kacho'},{th:0,rank:'senninkacho'}] },
  '5a':  { tiers:[{th:10,rank:'kacho'},{th:0,rank:'senninkacho'}], note:'人事課長合議' },
  '5b':  { tiers:[{th:10,rank:'kacho'},{th:0,rank:'senninkacho'}], note:'消防本部総務課長合議' },
  '6':   { tiers:[{th:10,rank:'kacho'},{th:0,rank:'senninkacho'}], note:'人事課長合議' },

  // --- 7節 報償費 ---
  '7a':  { tiers:[{th:1000,rank:'bucho'},{th:500,rank:'jicho'},{th:10,rank:'kacho'},{th:0,rank:'senninkacho'}] },
  '7b':  { tiers:[{th:10,rank:'kacho'},{th:0,rank:'senninkacho'}] },

  // --- 8節 旅費 ---
  '8a':  { tiers:[{th:500,rank:'jicho'},{th:10,rank:'kacho'},{th:0,rank:'senninkacho'}] },
  '8b':  { tiers:[{th:10,rank:'kacho'},{th:0,rank:'senninkacho'}], note:'人事課長合議' },

  // --- 9節 交際費 ---
  '9':   { tiers:[{th:500,rank:'jicho'},{th:10,rank:'kacho'},{th:0,rank:'senninkacho'}] },

  // --- 10節 需用費 ---
  '10a': { tiers:[{th:500,rank:'jicho'},{th:10,rank:'kacho'},{th:0,rank:'senninkacho'}] },
  '10b': { tiers:[{th:10,rank:'kacho'},{th:0,rank:'senninkacho'}] },
  '10c': { tiers:[{th:10,rank:'kacho'},{th:0,rank:'senninkacho'}], note:'会計課長合議' },
  '10d': { tiers:[{th:500,rank:'jicho'},{th:10,rank:'kacho'},{th:0,rank:'senninkacho'}] },
  '10e': { tiers:[{th:3000,rank:'bucho'},{th:1000,rank:'jicho'},{th:10,rank:'kacho'},{th:0,rank:'senninkacho'}] },

  // --- 11節 役務費 ---
  '11a': { tiers:[{th:500,rank:'jicho'},{th:10,rank:'kacho'},{th:0,rank:'senninkacho'}] },
  '11b': { tiers:[{th:10,rank:'kacho'},{th:0,rank:'senninkacho'}] },
  '11c': { tiers:[{th:10,rank:'kacho'},{th:0,rank:'senninkacho'}], note:'会計課長合議' },

  // --- 12節 委託料 ---
  '12a': { tiers:[{th:3000,rank:'bucho'},{th:1000,rank:'jicho'},{th:10,rank:'kacho'},{th:0,rank:'senninkacho'}] },
  '12b': { tiers:[{th:500,rank:'jicho'},{th:10,rank:'kacho'},{th:0,rank:'senninkacho'}] },

  // --- 13節 使用料及び賃借料 ---
  '13a': { tiers:[{th:1000,rank:'bucho'},{th:500,rank:'jicho'},{th:10,rank:'kacho'},{th:0,rank:'senninkacho'}] },
  '13b': { tiers:[{th:500,rank:'jicho'},{th:10,rank:'kacho'},{th:0,rank:'senninkacho'}] },

  // --- 14節 工事請負費 ---

  // --- 15節 原材料費 ---
  '15':  { tiers:[{th:500,rank:'jicho'},{th:10,rank:'kacho'},{th:0,rank:'senninkacho'}] },

  // --- 16節 公有財産購入費 ---
  '16':  { tiers:[{th:1000,rank:'bucho'},{th:500,rank:'jicho'},{th:10,rank:'kacho'},{th:0,rank:'senninkacho'}] },

  // --- 17節 備品購入費 ---
  '17':  { tiers:[{th:1000,rank:'bucho'},{th:500,rank:'jicho'},{th:10,rank:'kacho'},{th:0,rank:'senninkacho'}] },

  // --- 18節 負担金・補助及び交付金 ---
  '18a': { tiers:[{th:1000,rank:'bucho'},{th:500,rank:'jicho'},{th:10,rank:'kacho'},{th:0,rank:'senninkacho'}] },
  '18b': { tiers:[{th:10,rank:'kacho'},{th:0,rank:'senninkacho'}] },

  // --- 19節 扶助費 ---
  '19':  { tiers:[{th:10,rank:'kacho'},{th:0,rank:'senninkacho'}] },

  // --- 20節 貸付金 ---
  '20':  { tiers:[{th:1000,rank:'bucho'},{th:500,rank:'jicho'},{th:10,rank:'kacho'},{th:0,rank:'senninkacho'}] },

  // --- 21節 補償・補填及び賠償金 ---

// ===== 結果クリア =====
function clearResult(which) {
  const el = document.getElementById('result-' + which);
  el.innerHTML = '<span class="result-empty">種類と金額を入力してください</span>';
}

// ===== 金額フォーマット =====
function fmtAmount(val) {
  if (val >= 10000)     return (val / 10000).toLocaleString('ja-JP', {maximumFractionDigits:2}) + '億円';
  if (val >= 1)         return val.toLocaleString('ja-JP', {maximumFractionDigits:2}) + '万円';
  return (val * 10000).toLocaleString('ja-JP') + '円';
}

// ===== 結果表示 =====
function showResult(elId, rankKey, amountWan, subLabel, note) {
  const r    = RANKS[rankKey];
  const el   = document.getElementById(elId);
  const bang = rankKey === 'shicho' ? '！！！！！' :
               rankKey === 'fuku'   ? '！！！！'   :
               rankKey === 'bucho'  ? '！！！'     :
               rankKey === 'jicho'  ? '！！'       : '！';

  // ランクバー
  let pips = '';
  for (let i = 1; i <= 5; i++) {
    const activeClass = i <= r.bar ? r.pip : '';
    pips += `<div class="rank-pip ${activeClass}"></div>`;
  }

  const noteHtml = note ? `<div class="result-desc">📎 ${note}</div>` : '';

  el.innerHTML = `
    <div class="result-label">${subLabel} ／ ${fmtAmount(amountWan)}</div>
    <div class="result-name ${r.css} anim-boom">${r.emoji}${bang}<br>${r.name}${bang}</div>
    <div class="result-bang ${r.css}">${bang}</div>
    <div class="rank-bar">${pips}</div>
    <div class="result-desc">${r.msg}</div>
    ${noteHtml}
  `;

  // 大物はシェイク
  if (rankKey === 'fuku' || rankKey === 'shicho') {
    setTimeout(() => {
      const nm = el.querySelector('.result-name');
      if (nm) { nm.style.animation = 'none'; setTimeout(() => { nm.style.animation = 'shake 0.4s ease'; }, 50); }
    }, 500);
  }
}

// ===== 別表２ 判定 =====
function judgeB2() {
  const typeVal  = document.getElementById('b2-type').value;
  const amountEl = document.getElementById('b2-amount');
  const amount   = parseFloat(amountEl.value);

  if (!typeVal) { alert('契約の種類を選択してください。'); return; }
  if (isNaN(amount) || amount < 0) { alert('金額を正しく入力してください（万円単位）。'); return; }

  const rules = B2_RULES[typeVal];
  let rankKey = rules[rules.length - 1][1]; // default lowest
  for (const [threshold, rank] of rules) {
    if (amount >= threshold) { rankKey = rank; break; }
  }

  const typeLabel = document.getElementById('b2-type').options[document.getElementById('b2-type').selectedIndex].text;
  showResult('result-b2', rankKey, amount, typeLabel, null);
}

// ===== 別表３ 判定 =====
function judgeB3() {
  const typeVal  = document.getElementById('b3-type').value;
  const amountEl = document.getElementById('b3-amount');
  const amount   = parseFloat(amountEl.value);

  if (!typeVal) { alert('節・区分を選択してください。'); return; }
  if (isNaN(amount) || amount < 0) { alert('金額を正しく入力してください（万円単位）。'); return; }

  const rule = B3_RULES[typeVal];
  if (!rule) { alert('このコードに対応するルールが見つかりません。'); return; }

  let rankKey = rule.tiers[rule.tiers.length - 1].rank; // default lowest
  for (const tier of rule.tiers) {
    if (amount >= tier.th) { rankKey = tier.rank; break; }
  }

  const typeLabel = document.getElementById('b3-type').options[document.getElementById('b3-type').selectedIndex].text;
  showResult('result-b3', rankKey, amount, typeLabel, rule.note || null);
}

// ===== Enterキー対応 =====
document.getElementById('b2-amount').addEventListener('keydown', e => { if (e.key === 'Enter') judgeB2(); });
document.getElementById('b3-amount').addEventListener('keydown', e => { if (e.key === 'Enter') judgeB3(); });
</script>
