<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>一宮市 専決判定くん</title>
<style>
  :root {
    --bg: #0f0f1a;
    --card: #1a1a2e;
    --card2: #16213e;
    --accent: #e94560;
    --accent2: #0f3460;
    --gold: #ffd700;
    --silver: #c0c0c0;
    --text: #eaeaea;
    --muted: #8888aa;
    --border: #2a2a4a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', 'Meiryo UI', Meiryo, sans-serif;
    min-height: 100vh;
    padding: 20px;
  }
  h1 {
    text-align: center;
    font-size: 1.6rem;
    margin-bottom: 6px;
    color: var(--gold);
    text-shadow: 0 0 20px rgba(255,215,0,0.4);
    letter-spacing: 2px;
  }
  .subtitle {
    text-align: center;
    color: var(--muted);
    font-size: 0.85rem;
    margin-bottom: 24px;
  }

  /* タブ */
  .tabs {
    display: flex;
    gap: 4px;
    background: var(--card2);
    padding: 6px;
    border-radius: 12px;
    max-width: 700px;
    margin: 0 auto 24px;
  }
  .tab-btn {
    flex: 1;
    padding: 10px 6px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.82rem;
    font-weight: bold;
    transition: all 0.2s;
    background: transparent;
    color: var(--muted);
    line-height: 1.3;
  }
  .tab-btn.active {
    background: var(--accent2);
    color: var(--text);
    box-shadow: 0 2px 8px rgba(15,52,96,0.5);
  }
  .tab-btn:hover:not(.active) { background: rgba(255,255,255,0.06); color: var(--text); }

  /* コンテンツ */
  .tab-content { display: none; max-width: 700px; margin: 0 auto; }
  .tab-content.active { display: block; }

  .form-card {
    background: var(--card);
    border-radius: 16px;
    padding: 24px;
    border: 1px solid var(--border);
    margin-bottom: 20px;
  }
  label {
    display: block;
    font-size: 0.82rem;
    color: var(--muted);
    margin-bottom: 6px;
    letter-spacing: 0.5px;
  }
  select, input[type="number"] {
    width: 100%;
    background: var(--card2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 1rem;
    margin-bottom: 16px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  select:focus, input[type="number"]:focus { border-color: var(--accent); }
  select option { background: #1a1a2e; }

  .amount-row { display: flex; gap: 10px; align-items: flex-end; }
  .amount-row > div { flex: 1; }
  .unit-label {
    padding-bottom: 28px;
    color: var(--muted);
    font-size: 0.95rem;
    white-space: nowrap;
  }

  .btn-judge {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--accent) 0%, #c0392b 100%);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 1.1rem;
    font-weight: bold;
    cursor: pointer;
    letter-spacing: 2px;
    transition: transform 0.1s, box-shadow 0.2s;
    box-shadow: 0 4px 15px rgba(233,69,96,0.4);
  }
  .btn-judge:hover  { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(233,69,96,0.5); }
  .btn-judge:active { transform: translateY(1px); }

  /* 結果エリア */
  #result-b2, #result-b3, #result-sfa {
    text-align: center;
    padding: 30px 20px;
    background: var(--card);
    border-radius: 16px;
    border: 1px solid var(--border);
    min-height: 200px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }
  .result-empty { color: var(--muted); font-size: 0.9rem; }
  .result-label { font-size: 0.85rem; color: var(--muted); letter-spacing: 1px; }
  .result-name {
    font-size: 3.2rem;
    font-weight: 900;
    letter-spacing: 4px;
    line-height: 1.1;
    text-shadow: 0 0 30px currentColor;
  }
  .result-bang { font-size: 2rem; font-weight: 900; letter-spacing: 8px; opacity: 0.85; }
  .result-desc { font-size: 0.88rem; color: var(--muted); max-width: 440px; line-height: 1.6; }

  /* ランク別カラー */
  .rank-sennin { color: #90a4ae; }
  .rank-kacho  { color: #4fc3f7; }
  .rank-jicho  { color: #81c784; }
  .rank-bucho  { color: #ffb74d; }
  .rank-fuku   { color: var(--gold); }
  .rank-shicho { color: #ff7043; }

  /* アニメ */
  @keyframes boom {
    0%   { transform: scale(0.3) rotate(-5deg); opacity: 0; }
    60%  { transform: scale(1.15) rotate(1deg); }
    80%  { transform: scale(0.95); }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }
  .anim-boom { animation: boom 0.45s cubic-bezier(0.34,1.56,0.64,1) forwards; }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%     { transform: translateX(-10px); }
    40%     { transform: translateX(10px); }
    60%     { transform: translateX(-5px); }
    80%     { transform: translateX(5px); }
  }
  @keyframes pulse {
    0%,100% { text-shadow: 0 0 30px currentColor; }
    50%     { text-shadow: 0 0 60px currentColor, 0 0 100px currentColor; }
  }

  /* ランクバー（6段階） */
  .rank-bar { display: flex; gap: 6px; margin-top: 8px; justify-content: center; }
  .rank-pip {
    width: 26px;
    height: 8px;
    border-radius: 4px;
    background: var(--border);
    transition: background 0.3s;
  }
  .rank-pip.p-sennin { background: #90a4ae; box-shadow: 0 0 5px #90a4ae; }
  .rank-pip.p-kacho  { background: #4fc3f7; box-shadow: 0 0 6px #4fc3f7; }
  .rank-pip.p-jicho  { background: #81c784; box-shadow: 0 0 6px #81c784; }
  .rank-pip.p-bucho  { background: #ffb74d; box-shadow: 0 0 6px #ffb74d; }
  .rank-pip.p-fuku   { background: var(--gold); box-shadow: 0 0 8px var(--gold); }
  .rank-pip.p-shicho { background: #ff7043; box-shadow: 0 0 10px #ff7043; }

  optgroup { font-weight: bold; }
</style>
</head>
<body>

<h1>専決判定くん</h1>
<p class="subtitle">一宮市専決規程・予算執行規則 ― 金額を入れると、誰が専決できるか即判定！</p>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('b2', this)">予定価格</button>
  <button class="tab-btn"       onclick="switchTab('sfa', this)">支出負担行為</button>
  <button class="tab-btn"       onclick="switchTab('b3', this)">支出命令</button>
</div>

<!-- ===== 予定価格 ===== -->
<div class="tab-content active" id="tab-b2">
  <div class="form-card">
    <label>契約の種類</label>
    <select id="b2-type" onchange="clearResult('b2')">
      <option value="">── 選択してください ──</option>
      <option value="kouji">工事（設計金額）</option>
      <option value="measurement">工事に関する測量・調査・設計・監理等（設計金額）</option>
      <option value="goods">物品・備品</option>
      <option value="consign">委託（工事測量・調査・設計・監理等を除く）</option>
    </select>
    <label>金額（万円）</label>
    <div class="amount-row">
      <div><input type="number" id="b2-amount" min="0" step="1" placeholder="例：2500" oninput="clearResult('b2')"></div>
      <div class="unit-label">万円</div>
    </div>
    <button class="btn-judge" onclick="judgeB2()">判　定　！</button>
  </div>
  <div id="result-b2"><span class="result-empty">種類と金額を入力してください</span></div>
</div>

<!-- ===== 支出負担行為 ===== -->
<div class="tab-content" id="tab-sfa">
  <div class="form-card">
    <label>節</label>
    <select id="sfa-sec" onchange="onSFASecChange()">
      <option value="">── 節を選んでください ──</option>
    </select>
    <div id="sfa-sub-wrap" style="display:none">
      <label>区分</label>
      <select id="sfa-sub" onchange="clearResult('sfa')"></select>
    </div>
    <label>金額（万円）</label>
    <div class="amount-row">
      <div><input type="number" id="sfa-amount" min="0" step="0.01" placeholder="例：800" oninput="clearResult('sfa')"></div>
      <div class="unit-label">万円</div>
    </div>
    <button class="btn-judge" onclick="judgeSFA()">判　定　！</button>
  </div>
  <div id="result-sfa"><span class="result-empty">節・区分と金額を入力してください</span></div>
</div>

<!-- ===== 支出命令 ===== -->
<div class="tab-content" id="tab-b3">
  <div class="form-card">
    <label>節</label>
    <select id="b3-sec" onchange="onB3SecChange()">
      <option value="">── 節を選んでください ──</option>
    </select>
    <div id="b3-sub-wrap" style="display:none">
      <label>区分</label>
      <select id="b3-sub" onchange="clearResult('b3')"></select>
    </div>
    <label>金額（万円）</label>
    <div class="amount-row">
      <div><input type="number" id="b3-amount" min="0" step="0.01" placeholder="例：150" oninput="clearResult('b3')"></div>
      <div class="unit-label">万円</div>
    </div>
    <button class="btn-judge" onclick="judgeB3()">判　定　！</button>
  </div>
  <div id="result-b3"><span class="result-empty">節・区分と金額を入力してください</span></div>
</div>

<script>
// ===== タブ切替 =====
function switchTab(tab, btn) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  btn.classList.add('active');
}

// ===== 専決者データ（6段階） =====
// bar: ランクバー点灯数（1〜6）
const RANKS = {
  senninkacho:   { name: '専任課長等',           css: 'rank-sennin', pip: 'p-sennin', bar: 1, emoji: '📋', msg: 'ルーティン案件！専任課長等が颯爽とはんこを押す！'       },
  kacho:         { name: '課長等',               css: 'rank-kacho',  pip: 'p-kacho',  bar: 2, emoji: '✅', msg: '定例業務！課長等がテキパキ処理します！'                },
  jinjichoOnly:  { name: '人事課長のみ',         css: 'rank-kacho',  pip: 'p-kacho',  bar: 2, emoji: '📋', msg: '人事課長の専決案件！人事課長のみがはんこを押す！'      },
  kaikakachoOnly:{ name: '会計課長のみ',         css: 'rank-kacho',  pip: 'p-kacho',  bar: 2, emoji: '🧾', msg: '会計課長の専決案件！会計課長のみが処理します！'        },
  shobohonbuOnly:{ name: '消防本部総務課長のみ', css: 'rank-kacho',  pip: 'p-kacho',  bar: 2, emoji: '🚒', msg: '消防本部総務課長の専決案件！'                         },
  jicho:         { name: '部等の次長等',         css: 'rank-jicho',  pip: 'p-jicho',  bar: 3, emoji: '📂', msg: 'ちょっと大きめ！次長等クラスの案件です！'              },
  bucho:         { name: '部長等',               css: 'rank-bucho',  pip: 'p-bucho',  bar: 4, emoji: '🔑', msg: 'かなりの大型案件！部長等の出番！'                     },
  fuku:          { name: '副市長',               css: 'rank-fuku',   pip: 'p-fuku',   bar: 5, emoji: '👑', msg: '大型！副市長マター！市全体を揺るがすスケール！'         },
  shicho:        { name: '市　長',               css: 'rank-shicho', pip: 'p-shicho', bar: 6, emoji: '🏛️', msg: '超大型案件！これは市長決裁！！市が動く！！！' },
};

// ===== 別表２ 判定ルール（予定価格） =====
// [閾値（万円）降順, ランクキー] — 閾値以上のとき適用
const B2_RULES = {
  kouji:       [[15000,'shicho'],[5000,'fuku'],[3000,'bucho'],[1000,'jicho'],[0,'kacho']],
  measurement: [[15000,'shicho'],[5000,'fuku'],[3000,'bucho'],[1000,'jicho'],[0,'kacho']],
  goods:       [[3000,'fuku'],[1000,'bucho'],[ 500,'jicho'],[0,'kacho']],
  consign:     [[3000,'fuku'],[1000,'bucho'],[ 500,'jicho'],[0,'kacho']],
};

// ===== 別表３ 判定ルール（支出命令専決区分、単位：万円） =====
// tiers: [{th:閾値, rank:ランクキー}, ...] 降順
const B3_RULES = {

  '4a':  { tiers:[{th:10,rank:'kacho'},{th:0,rank:'senninkacho'}], note:'人事課長合議' },
  '4b':  { tiers:[{th:10,rank:'kacho'},{th:0,rank:'senninkacho'}] },
  '5a':  { tiers:[{th:10,rank:'kacho'},{th:0,rank:'senninkacho'}], note:'人事課長合議' },
  '5b':  { tiers:[{th:10,rank:'kacho'},{th:0,rank:'senninkacho'}], note:'消防本部総務課長合議' },
  '6':   { tiers:[{th:10,rank:'kacho'},{th:0,rank:'senninkacho'}], note:'人事課長合議' },
  // 7節 報償費
  '7a':  { tiers:[{th:1000,rank:'bucho'},{th:500,rank:'jicho'},{th:10,rank:'kacho'},{th:0,rank:'senninkacho'}] },

  // 8節 旅費
  '8a':  { tiers:[{th:500,rank:'jicho'},{th:10,rank:'kacho'},{th:0,rank:'senninkacho'}] },

  '10b': { tiers:[{th:10,rank:'kacho'},{th:0,rank:'senninkacho'}] },
  '10c': { tiers:[{th:10,rank:'kacho'},{th:0,rank:'senninkacho'}], note:'会計課長合議' },

  '18b': { tiers:[{th:10,rank:'kacho'},{th:0,rank:'senninkacho'}] },

  '19':  { tiers:[{th:10,rank:'kacho'},{th:0,rank:'senninkacho'}] },

  '20':  { tiers:[{th:1000,rank:'bucho'},{th:500,rank:'jicho'},{th:10,rank:'kacho'},{th:0,rank:'senninkacho'}] },

// ===== 支出負担行為専決区分ルール（単位：万円） =====
// 根拠：予算の編成及び執行に関する規則 別表第1
// ここでは「市長」も登場しうる（交際費 10万円以上）
const SFA_RULES = {
  // 1〜6節（人件費系）
  // ※人事課長のみ／消防本部総務課長のみの区分は該当専決者のみ処理可
  's1a': { tiers:[{th:0,rank:'kacho'}] },
  's1b': { tiers:[{th:0,rank:'jinjichoOnly'}] },
  's2':  { tiers:[{th:0,rank:'jinjichoOnly'}] },
  's3a': { tiers:[{th:0,rank:'jinjichoOnly'}] },
  's3b': { tiers:[{th:0,rank:'kacho'}] },
  's4a': { tiers:[{th:0,rank:'jinjichoOnly'}] },
  's4b': { tiers:[{th:0,rank:'kacho'}] },
  's5a': { tiers:[{th:0,rank:'jinjichoOnly'}] },
  's5b': { tiers:[{th:0,rank:'shobohonbuOnly'}] },
  's6':  { tiers:[{th:0,rank:'jinjichoOnly'}] },

  // 7節 報償費
  // 100万円以上→副市長, 50〜100万円未満→部長等, 50万円未満→課長等

  's7b': { tiers:[{th:0,rank:'kacho'}] },

  // 8節 旅費

// ===== 結果クリア =====
function clearResult(which) {
  document.getElementById('result-' + which).innerHTML =
    '<span class="result-empty">種類と金額を入力してください</span>';
}

// ===== 金額フォーマット =====
function fmtAmount(val) {
  if (val >= 10000) return (val / 10000).toLocaleString('ja-JP', {maximumFractionDigits:2}) + '億円';
  if (val >= 1)     return val.toLocaleString('ja-JP', {maximumFractionDigits:2}) + '万円';
  return (val * 10000).toLocaleString('ja-JP') + '円';
}

// ===== 結果表示 =====
function showResult(elId, rankKey, amountWan, subLabel, note) {
  const r  = RANKS[rankKey];
  const el = document.getElementById(elId);
  const bang = { shicho:'！！！！！', fuku:'！！！！', bucho:'！！！', jicho:'！！', kacho:'！', senninkacho:'！', jinjichoOnly:'！！！', kaikakachoOnly:'！！！', shobohonbuOnly:'！！！' }[rankKey] || '！';

  // 6段階ランクバー
  let pips = '';
  for (let i = 1; i <= 6; i++) {
    pips += `<div class="rank-pip ${i <= r.bar ? r.pip : ''}"></div>`;
  }

  const noteHtml = note ? `<div class="result-desc">📎 ${note}</div>` : '';
  const extraStyle = rankKey === 'shicho' ? 'animation: pulse 1s ease-in-out infinite;' : '';

  el.innerHTML = `
    <div class="result-label">${subLabel} ／ ${fmtAmount(amountWan)}</div>
    <div class="result-name ${r.css} anim-boom" style="${extraStyle}">${r.emoji}${bang}<br>${r.name}${bang}</div>
    <div class="result-bang ${r.css}">${bang}</div>
    <div class="rank-bar">${pips}</div>
    <div class="result-desc">${r.msg}</div>
    ${noteHtml}
  `;

  if (rankKey === 'fuku' || rankKey === 'shicho') {
    setTimeout(() => {
      const nm = el.querySelector('.result-name');
      if (nm) { nm.style.animation = 'none'; setTimeout(() => { nm.style.animation = 'shake 0.45s ease' + (rankKey === 'shicho' ? ', pulse 1s ease-in-out 0.5s infinite' : ''); }, 50); }
    }, 500);
  }
}

// ===== 別表２ 判定 =====
function judgeB2() {
  const typeVal = document.getElementById('b2-type').value;
  const amount  = parseFloat(document.getElementById('b2-amount').value);
  if (!typeVal)              { alert('契約の種類を選択してください。'); return; }
  if (isNaN(amount)||amount<0){ alert('金額を正しく入力してください（万円単位）。'); return; }
  const rules = B2_RULES[typeVal];
  let rankKey = rules[rules.length-1][1];
  for (const [th, rk] of rules) { if (amount >= th) { rankKey = rk; break; } }
  const label = document.getElementById('b2-type').options[document.getElementById('b2-type').selectedIndex].text;
  showResult('result-b2', rankKey, amount, label, null);
}

// ===== 節セレクト初期化 =====
function initSecSelects() {
  [['b3-sec', B3_SEC], ['sfa-sec', SFA_SEC]].forEach(([id, MAP]) => {
    const sel = document.getElementById(id);
    Object.entries(MAP).forEach(([k, {n}]) => {
      const opt = document.createElement('option');
      opt.value = k; opt.textContent = n;
      sel.appendChild(opt);
    });
  });
}

// ===== 2段階セレクト変更 =====
function onSecChange(tab) {
  const MAP  = tab === 'b3' ? B3_SEC : SFA_SEC;
  const sec  = document.getElementById(tab + '-sec').value;
  const wrap = document.getElementById(tab + '-sub-wrap');
  const sub  = document.getElementById(tab + '-sub');
  clearResult(tab);
  if (!sec) { wrap.style.display = 'none'; return; }
  const items = MAP[sec].s;
  if (items.length === 1) {
    wrap.style.display = 'none';
  } else {
    sub.innerHTML = items.map(([k, l]) => `<option value="${k}">${l}</option>`).join('');
    wrap.style.display = 'block';
  }
}
function onB3SecChange()  { onSecChange('b3');  }
function onSFASecChange() { onSecChange('sfa'); }

// ===== 判定キー・ラベル取得 =====
function getKey(tab) {
  const MAP   = tab === 'b3' ? B3_SEC : SFA_SEC;
  const sec   = document.getElementById(tab + '-sec').value;
  if (!sec) return null;
  const items = MAP[sec].s;
  if (items.length === 1) return items[0][0];
  return document.getElementById(tab + '-sub').value || null;
}
function getLabel(tab) {
  const MAP  = tab === 'b3' ? B3_SEC : SFA_SEC;
  const sec  = document.getElementById(tab + '-sec').value;
  if (!sec) return '';
  const {n, s} = MAP[sec];
  if (s.length === 1) return n;
  const subSel = document.getElementById(tab + '-sub');
  const subTxt = subSel.options[subSel.selectedIndex] ? subSel.options[subSel.selectedIndex].text : '';
  return subTxt ? n + ' ／ ' + subTxt : n;
}

// ===== 別表３ 判定 =====
function judgeB3() {
  const typeVal = getKey('b3');
  const amount  = parseFloat(document.getElementById('b3-amount').value);
  if (!typeVal)               { alert('節・区分を選択してください。'); return; }
  if (isNaN(amount)||amount<0){ alert('金額を正しく入力してください（万円単位）。'); return; }
  const rule = B3_RULES[typeVal];
  let rankKey = rule.tiers[rule.tiers.length-1].rank;
  for (const tier of rule.tiers) { if (amount >= tier.th) { rankKey = tier.rank; break; } }
  showResult('result-b3', rankKey, amount, getLabel('b3'), rule.note||null);
}

// ===== 支出負担行為 判定 =====
function judgeSFA() {
  const typeVal = getKey('sfa');
  const amount  = parseFloat(document.getElementById('sfa-amount').value);
  if (!typeVal)               { alert('節・区分を選択してください。'); return; }
  if (isNaN(amount)||amount<0){ alert('金額を正しく入力してください（万円単位）。'); return; }
  const rule = SFA_RULES[typeVal];
  let rankKey = rule.tiers[rule.tiers.length-1].rank;
  for (const tier of rule.tiers) { if (amount >= tier.th) { rankKey = tier.rank; break; } }
  showResult('result-sfa', rankKey, amount, getLabel('sfa'), rule.note||null);
}

// ===== 初期化・Enterキー対応 =====
initSecSelects();
document.getElementById('b2-amount').addEventListener('keydown',  e => { if (e.key==='Enter') judgeB2();  });
document.getElementById('b3-amount').addEventListener('keydown',  e => { if (e.key==='Enter') judgeB3();  });
document.getElementById('sfa-amount').addEventListener('keydown', e => { if (e.key==='Enter') judgeSFA(); });
</script>
